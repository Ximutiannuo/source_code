# ProjectControls Nginx 配置文件 - Windows Server版本
# 生产环境部署配置

# 上游后端服务器配置（负载均衡）
upstream backend_servers {
    # 可以根据需要添加多个后端实例
    # 默认使用轮询方式
    # 使用端口 8001，避免与端口 8000 冲突（8200 是 Vault）
    server 127.0.0.1:8001;
    # 如果需要多个后端实例，取消下面的注释
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
    
    # 可选：使用IP哈希实现会话保持
    # ip_hash;
    
    # 可选：设置权重
    # server 127.0.0.1:8001 weight=2;
}

# HTTP服务器配置（重定向到HTTPS）
# 使用端口 8080 用于 HTTP，避免与 PrecomControl 的 80 端口冲突
server {
    listen 8080;
    server_name 10.78.44.3;
    
    # 所有请求重定向到HTTPS（8443端口）
    location / {
        return 301 https://$server_name:8443$request_uri;
    }
}

# HTTPS服务器配置
# 使用端口 8443，与 PrecomControl 的 443 端口区分
# 访问地址: https://10.78.44.3:8443
server {
    listen 8443 ssl;
    http2 on;
    server_name 10.78.44.3;
    
    # SSL证书配置（使用独立的证书文件，避免与 PrecomControl 冲突）
    ssl_certificate C:/nginx/ssl/projectcontrols_cert.pem;
    ssl_certificate_key C:/nginx/ssl/projectcontrols_key.pem;
    
    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # 安全头设置
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 日志配置（Windows路径）
    access_log C:/nginx/logs/projectcontrols_access.log;
    error_log C:/nginx/logs/projectcontrols_error.log;
    
    # 客户端上传文件大小限制
    client_max_body_size 100M;
    
    # 导出接口专用配置（超时时间更长，因为需要处理大量数据）
    location ~ ^/api/daily-report-management/export {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 导出接口超时设置（增加到10分钟，因为VFACTDB导出需要大量数据查询）
        proxy_connect_timeout 300s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # 缓冲设置（导出文件可能较大）
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
    }
    
    # AI 助手聊天接口专用（DeepSeek + 多轮 Function Calling + ahead_plan 查询，耗时可超 5 分钟，避免 504）
    location ~ ^/api/ai-assistant/ {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 120s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # 专项计划 ahead-plan 接口（view/summary 大数据量，避免 504 并防止阻塞其他接口）
    location ~ ^/api/ahead-plan/ {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 120s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
    }

    # facility-filter 级联筛选（activity_summary 大表，避免 504）
    location ~ ^/api/facility-filter/ {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 工效分析/趋势接口专用（大数据量聚合，增加超时避免 504）
    location ~ ^/api/dashboard/(productivity-analysis|productivity-trend) {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 120s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
    
    # 工程量 Excel 批量导入专用（精确匹配，避免 502/504）
    location = /api/volume-control-v2/batch-update {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 120s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
    }
    
    # 导入接口专用配置（超时时间更长，因为需要处理大量数据）
    location ~ ^/api/(mpdb|vfactdb) {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 导入接口超时设置（增加到10分钟，因为需要处理大量数据）
        proxy_connect_timeout 300s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # 缓冲设置（导入文件可能较大）
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
    }
    
    # 日报管理导入接口专用配置（超时时间更长，因为需要处理大量数据）
    location ~ ^/api/daily-report-management/import {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 导入接口超时设置（增加到10分钟，因为需要处理大量数据）
        proxy_connect_timeout 300s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # 缓冲设置（导入文件可能较大）
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
    }
    
    # MDR 接口专用配置（增加超时时间，处理大数据量统计）
    location ~ ^/api/external-data/mdr/ {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置（增加到10分钟）
        proxy_connect_timeout 300s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }
    
    # API请求代理到后端（必须在 location / 之前，确保优先匹配）
    location /api {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket支持（如果需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置（全局增加到5分钟，避免部分未匹配到专用 location 的接口报 504）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # 健康检查端点
    location /health {
        proxy_pass http://backend_servers/health;
        access_log off;
    }
    
    # 静态资源缓存（优先匹配，避免进入主 location）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root C:/Projects/ProjectControls/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 前端静态文件服务（Windows路径）
    # 注意：这个 location 必须在 API 和静态资源 location 之后，作为 fallback
    location / {
        root C:/Projects/ProjectControls/frontend/dist;
        index index.html;
        try_files $uri $uri/ @fallback;
    }
    
    # Fallback 处理：所有未找到的文件都返回 index.html（用于 React Router）
    location @fallback {
        root C:/Projects/ProjectControls/frontend/dist;
        try_files /index.html =404;
    }
}

